
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}Hotel Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body {
            background-color: #F8F6F2;
            color: #2E2E2E;
        }
        .navbar {
            background-color: #1F3A44 !important;
        }
        .navbar-brand {
            color: #C6A75E !important;
            font-weight: 700;
        }
        .nav-link {
            color: #ffffff !important;
        }
        .nav-link:hover {
            color: #C6A75E !important;
        }
        .btn-primary {
            background-color: #1F3A44;
            border-color: #1F3A44;
        }
        .btn-primary:hover {
            background-color: #C6A75E;
            border-color: #C6A75E;
        }
        .card {
            background-color: #FFFFFF;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .table thead {
            background-color: #1F3A44;
            color: #ffffff;
        }
        .table thead th {
            color: #ffffff;
        }
        .page-title {
            color: #1F3A44;
            font-weight: 700;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">🏨 Mosha Hotel MS</a>
        <button class="navbar-toggler" type="button" 
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'guest_list' %}">Guests</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Rooms</a>
                </li>
                <li class="nav-item">
                   <a class="nav-link" href="{% url 'payment_list' %}">Payments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'report' %}">Reports</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
