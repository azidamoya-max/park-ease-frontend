<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AttendTrack{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f9; }
        nav { background: #2d3561; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 1rem; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .btn { padding: .5rem 1rem; border-radius: 6px; text-decoration: none; font-size: .9rem; border: none; cursor: pointer; }
        .btn-primary { background: #2d3561; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #ddd; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #2d3561; color: white; padding: .8rem 1rem; text-align: left; }
        td { padding: .8rem 1rem; border-bottom: 1px solid #eee; }
        .card { background: white; padding: 2rem; border-radius: 8px; }
        input, select { width: 100%; padding: .6rem; margin-top: .3rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        label { font-weight: bold; display: block; margin-top: 1rem; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'student_list' %}" style="font-size:1.3rem; font-weight:bold;">AttendTrack</a>
    <div>
        <a href="{% url 'student_list' %}">All Records</a>
        <a href="{% url 'student_create' %}">+ Add Record</a>
    </div>
</nav>
<div class="container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
